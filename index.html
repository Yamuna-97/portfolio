<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPACECRAFT — Deep Space</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
  canvas { display: block; }

  #hud {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 16px;
    align-items: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 1s ease;
    flex-wrap: wrap;
    justify-content: center;
  }
  #hud.visible { opacity: 1; }
  .hud-item {
    color: rgba(255,160,50,0.7);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: 1px solid rgba(255,160,50,0.2);
    padding: 5px 12px;
    backdrop-filter: blur(4px);
  }
  .hud-item.highlight { color: rgba(100,200,255,0.85); border-color: rgba(100,200,255,0.3); }

  #speed-bar {
    position: fixed;
    top: 32px;
    right: 32px;
    width: 4px;
    height: 100px;
    background: rgba(255,255,255,0.05);
    border-radius: 2px;
    overflow: hidden;
    opacity: 0;
    transition: opacity 1s ease 0.5s;
  }
  #speed-bar.visible { opacity: 1; }
  #speed-fill {
    position: absolute;
    bottom: 0;
    width: 100%;
    background: linear-gradient(to top, #ff3000, #ff9f43);
    border-radius: 2px;
    transition: height 0.08s ease;
    height: 0%;
  }

  #stabilize-indicator {
    position: fixed;
    top: 32px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(100,200,255,0.9);
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    padding: 6px 16px;
    border: 1px solid rgba(100,200,255,0.3);
    backdrop-filter: blur(4px);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  #stabilize-indicator.active { opacity: 1; }

  #click-hint {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(255,160,50,0.9);
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    pointer-events: none;
    transition: opacity 0.5s;
    text-align: center;
    line-height: 2;
  }

  #boost-flash {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(255,80,0,0.1), transparent 70%);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
  }

  #compass {
    position: fixed;
    top: 32px;
    left: 32px;
    width: 70px;
    height: 70px;
    opacity: 0;
    transition: opacity 1s ease 0.5s;
  }
  #compass.visible { opacity: 1; }
  #compass svg { width: 100%; height: 100%; }
</style>
</head>
<body>

<div id="click-hint">CLICK TO ENGAGE CONTROLS<br><span style="font-size:10px;opacity:0.6">POINTER LOCK REQUIRED</span></div>
<div id="boost-flash"></div>
<div id="stabilize-indicator">⬆ STABILIZING ORIENTATION</div>
<div id="hud" class="hud">
  <div class="hud-item">W/S — THRUST</div>
  <div class="hud-item">A/D — STRAFE</div>
  <div class="hud-item">ARROWS — ROTATE</div>
  <div class="hud-item">SPACE — UP</div>
  <div class="hud-item">SHIFT — BOOST</div>
  <div class="hud-item highlight">ALT — STABILIZE</div>
</div>
<div id="speed-bar"><div id="speed-fill"></div></div>
<div id="compass" class="compass">
  <svg viewBox="0 0 70 70" xmlns="http://www.w3.org/2000/svg">
    <circle cx="35" cy="35" r="32" fill="none" stroke="rgba(255,160,50,0.2)" stroke-width="1"/>
    <circle cx="35" cy="35" r="2" fill="rgba(255,160,50,0.6)"/>
    <text x="35" y="10" text-anchor="middle" fill="rgba(255,160,50,0.7)" font-size="8" font-family="Courier New">N</text>
    <text x="35" y="65" text-anchor="middle" fill="rgba(255,160,50,0.4)" font-size="7" font-family="Courier New">S</text>
    <text x="10" y="38" text-anchor="middle" fill="rgba(255,160,50,0.4)" font-size="7" font-family="Courier New">W</text>
    <text x="63" y="38" text-anchor="middle" fill="rgba(255,160,50,0.4)" font-size="7" font-family="Courier New">E</text>
    <line id="compass-needle" x1="35" y1="35" x2="35" y2="10" stroke="rgba(100,200,255,0.8)" stroke-width="1.5" stroke-linecap="round"/>
  </svg>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ─── SCENE SETUP ────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000010, 0.00015);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 6000);
camera.position.set(0, 3, 14);

// ─── NEBULA BACKGROUND ───────────────────────────────────────────────────────
function createNebula() {
  const count = 1200;
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(count * 3);
  const colors = new Float32Array(count * 3);
  const sizes = new Float32Array(count);

  const nebulaColors = [
    new THREE.Color(0.4, 0.1, 0.8),
    new THREE.Color(0.8, 0.2, 0.4),
    new THREE.Color(0.1, 0.3, 0.9),
    new THREE.Color(0.2, 0.6, 0.8),
  ];

  for (let i = 0; i < count; i++) {
    const r = 600 + Math.random() * 500;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    positions[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    positions[i*3+2] = r * Math.cos(phi);
    sizes[i] = Math.random() * 8 + 4;
    const c = nebulaColors[Math.floor(Math.random() * nebulaColors.length)];
    colors[i*3]   = c.r * (0.3 + Math.random() * 0.4);
    colors[i*3+1] = c.g * (0.3 + Math.random() * 0.4);
    colors[i*3+2] = c.b * (0.3 + Math.random() * 0.4);
  }
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

  const mat = new THREE.PointsMaterial({
    size: 5.0, sizeAttenuation: true, vertexColors: true,
    transparent: true, opacity: 0.25,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  return new THREE.Points(geo, mat);
}
scene.add(createNebula());

// ─── STARFIELD ───────────────────────────────────────────────────────────────
function createStarfield() {
  const count = 10000;
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(count * 3);
  const colors = new Float32Array(count * 3);
  const sizes = new Float32Array(count);

  for (let i = 0; i < count; i++) {
    const r = 900 + Math.random() * 1400;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    positions[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    positions[i*3+2] = r * Math.cos(phi);
    sizes[i] = Math.random() * 1.5 + 0.2;
    const t = Math.random();
    if (t < 0.65)      { colors[i*3]=1;   colors[i*3+1]=1;    colors[i*3+2]=1;   }
    else if (t < 0.80) { colors[i*3]=0.6; colors[i*3+1]=0.78; colors[i*3+2]=1;   }
    else if (t < 0.92) { colors[i*3]=1;   colors[i*3+1]=0.88; colors[i*3+2]=0.6; }
    else               { colors[i*3]=1;   colors[i*3+1]=0.5;  colors[i*3+2]=0.5; }
  }

  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  const mat = new THREE.PointsMaterial({
    size: 0.55, sizeAttenuation: true, vertexColors: true,
    transparent: true, opacity: 0.95,
  });
  return new THREE.Points(geo, mat);
}
scene.add(createStarfield());

// ─── DISTANT PLANET ──────────────────────────────────────────────────────────
const planetGeo = new THREE.SphereGeometry(80, 32, 32);
const planetMat = new THREE.MeshStandardMaterial({
  color: 0x1a3a6a,
  emissive: 0x0a1a3a,
  emissiveIntensity: 0.3,
  roughness: 0.9,

});
const planet = new THREE.Mesh(planetGeo, planetMat);
planet.position.set(600, -200, -1200);
scene.add(planet);

// Planet ring
const ringGeo = new THREE.RingGeometry(100, 160, 64);
const ringMat = new THREE.MeshBasicMaterial({
  color: 0x3a6a9a,

const ring = new THREE.Mesh(ringGeo, ringMat);
ring.position.copy(planet.position);
ring.rotation.x = Math.PI * 0.35;
scene.add(ring);

const sunLight = new THREE.DirectionalLight(0xfff0e0, 1.2);
sunLight.position.set(100, 80, -200);
scene.add(sunLight);

const rimLight = new THREE.DirectionalLight(0x66aaff, 2.2);
rimLight.position.set(-20, 10, -20);

fillLight.position.set(0, -10, 10);
scene.add(fillLight);

const glowLight = new THREE.PointLight(0x66ccff, 1.2, 25);

// NOSE

nose.position.z = -3.4;

// Nose tip accent

const noseTip = new THREE.Mesh(noseTipGeo, new THREE.MeshStandardMaterial({ color: 0xff8800, emissive: 0xff4400, emissiveIntensity: 0.5 }));
noseTip.position.z = -4.9;
ship.add(noseTip);

// TAIL
const tailGeo = new THREE.CylinderGeometry(0.65, 0.58, 1.0, 10);
const tail = new THREE.Mesh(tailGeo, accentMat);
tail.rotation.x = Math.PI / 2;
tail.position.z = 2.95;
ship.add(tail);

// COCKPIT
const cockpitGeo = new THREE.SphereGeometry(0.4, 20, 12, 0, Math.PI * 2, 0, Math.PI * 0.55);
const cockpitMat = new THREE.MeshStandardMaterial({
  color: 0xff5500, emissive: 0xff3300, emissiveIntensity: 0.45,
  metalness: 0.05, roughness: 0.03, transparent: true, opacity: 0.82,
});
const cockpit = new THREE.Mesh(cockpitGeo, cockpitMat);
cockpit.rotation.x = Math.PI;
cockpit.position.set(0, 0.4, -0.7);
ship.add(cockpit);

// COCKPIT FRAME
const frameGeo = new THREE.TorusGeometry(0.4, 0.025, 8, 24, Math.PI * 0.9);
const frame = new THREE.Mesh(frameGeo, detailMat);
frame.rotation.x = -Math.PI * 0.15;
frame.position.set(0, 0.4, -0.7);
ship.add(frame);

// HULL PANEL DETAILS
function addPanel(x, y, z, w, h, d) {
  const g = new THREE.BoxGeometry(w, h, d);
  const m = new THREE.Mesh(g, detailMat);
  m.position.set(x, y, z);

addPanel(0.3, 0.55, 0.5, 0.15, 0.04, 1.2);
addPanel(-0.3, 0.55, 0.5, 0.15, 0.04, 1.2);
addPanel(0.3, 0.55, -1.0, 0.12, 0.04, 0.8);
addPanel(-0.3, 0.55, -1.0, 0.12, 0.04, 0.8);

// WINGS
function createWing(side) {
  const wing = new THREE.Group();

  const shape = new THREE.Shape();
  shape.moveTo(0, 0);
  shape.lineTo(side * 2.8, 0.6);
  shape.lineTo(side * 3.1, 1.8);
  shape.lineTo(side * 1.3, 2.6);
  shape.lineTo(side * 0.1, 1.9);
  shape.closePath();

  const extSettings = { depth: 0.09, bevelEnabled: true, bevelThickness: 0.04, bevelSize: 0.03, bevelSegments: 2 };
  const wingGeo = new THREE.ExtrudeGeometry(shape, extSettings);
  const wingMesh = new THREE.Mesh(wingGeo, metalMat);
  wingMesh.rotation.x = -Math.PI / 2;
  wingMesh.position.set(0, -0.045, -0.5);
  wing.add(wingMesh);

  // Wing edge stripe
  const stripeGeo = new THREE.BoxGeometry(0.04, 0.12, 1.6);
  const stripeMat = new THREE.MeshStandardMaterial({ color: 0xff4400, emissive: 0xff2200, emissiveIntensity: 0.3 });
  const stripe = new THREE.Mesh(stripeGeo, stripeMat);
  stripe.position.set(side * 2.55, 0, 0.6);
  wing.add(stripe);

  // Engine pod
  const podGeo = new THREE.CylinderGeometry(0.14, 0.17, 1.6, 10);
  const pod = new THREE.Mesh(podGeo, accentMat);
  pod.rotation.x = Math.PI / 2;
  pod.position.set(side * 2.85, 0, 0.85);
  wing.add(pod);

  // Pod intake ring
  const intakeGeo = new THREE.TorusGeometry(0.155, 0.025, 8, 20);
  const intake = new THREE.Mesh(intakeGeo, detailMat);
  intake.rotation.x = Math.PI / 2;
  intake.position.set(side * 2.85, 0, 0.05);
  wing.add(intake);

  // Nozzle
  const nozzleGeo = new THREE.CylinderGeometry(0.15, 0.12, 0.35, 10);
  const nozzleMat = new THREE.MeshStandardMaterial({ color: 0x080810, metalness: 1, roughness: 0.08 });
  const nozzle = new THREE.Mesh(nozzleGeo, nozzleMat);
  nozzle.rotation.x = Math.PI / 2;
  nozzle.position.set(side * 2.85, 0, 1.68);
  wing.add(nozzle);

  return wing;
}
ship.add(createWing(-1));
ship.add(createWing(1));

// DORSAL FIN
const finShape = new THREE.Shape();
finShape.moveTo(0, 0);
finShape.lineTo(-0.9, -1.0);
finShape.lineTo(0.6, -1.0);
finShape.lineTo(0.12, 0);
finShape.closePath();

fin.position.set(-0.03, 0.72, 1.3);

// VENTRAL FIN

vFinShape.moveTo(0, 0);

vFinShape.lineTo(0.3, 0.65);

// MAIN ENGINE
const engineGeo = new THREE.CylinderGeometry(0.24, 0.3, 0.55, 14);
const engineMat = new THREE.MeshStandardMaterial({ color: 0x050508, metalness: 1, roughness: 0.04 });

// Engine bell detail

function addPodGlow(x, z) {

const leftPodGlow  = addPodGlow(-2.85, 1.86);

// Point lights
const engineLight = new THREE.PointLight(0x00e5ff, 4.0, 12);

const leftEngineLight  = new THREE.PointLight(0x00e5ff, 1.4, 6);

const rightEngineLight = new THREE.PointLight(0x00e5ff, 1.4, 6);
rightEngineLight.position.set(2.85, 0, 2.0);

// ─── FIRE PARTICLE SYSTEM ────────────────────────────────────────────────────
class FireEngine {
  constructor(posOffset, radius, scene) {
    this.posOffset = posOffset;
    this.radius = radius;
    this.scene = scene;
    this.particles = [];
    this.count = 120;
    this.active = true;
    this.intensity = 0;

    const geo = new THREE.BufferGeometry();
    this.positions = new Float32Array(this.count * 3);
    this.colors    = new Float32Array(this.count * 3);
    this.sizes     = new Float32Array(this.count);

    for (let i = 0; i < this.count; i++) {
      this.positions[i*3+2] = 99999;
      this.particles.push({ life: 0, maxLife: 0, vx: 0, vy: 0, vz: 0, x: 0, y: 0, z: 0 });
    }

    geo.setAttribute('position', new THREE.BufferAttribute(this.positions, 3));
    geo.setAttribute('color',    new THREE.BufferAttribute(this.colors, 3));
    geo.setAttribute('size',     new THREE.BufferAttribute(this.sizes, 1));

    this.mat = new THREE.PointsMaterial({
      size: 0.35,
      sizeAttenuation: true,
      vertexColors: true,
      transparent: true,
      opacity: 0.88,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    });

    this.points = new THREE.Points(geo, this.mat);
    scene.add(this.points);
    this.geo = geo;
  }

  update(shipPos, shipQuat, intensity, isBoosting, dt) {
    this.intensity += (intensity - this.intensity) * 0.12;

    // Spawn new fire particles
    const spawnRate = Math.floor(this.intensity * (isBoosting ? 9 : 5));
    for (let s = 0; s < spawnRate; s++) {
      // Find dead particle
      let idx = -1;
      for (let i = 0; i < this.count; i++) {
        if (this.particles[i].life <= 0) { idx = i; break; }
      }
      if (idx === -1) continue;

      const p = this.particles[idx];
      const r = this.radius * Math.sqrt(Math.random());
      const angle = Math.random() * Math.PI * 2;

      // World position of nozzle
      const local = this.posOffset.clone().applyQuaternion(shipQuat).add(shipPos);
      p.x = local.x + Math.cos(angle) * r;
      p.y = local.y + Math.sin(angle) * r;
      p.z = local.z;

      // Velocity: mostly backward (positive Z in local), with some spread
      const backDir = new THREE.Vector3(0, 0, 1).applyQuaternion(shipQuat);
      const spreadX = (Math.random() - 0.5) * 0.06;
      const spreadY = (Math.random() - 0.5) * 0.06;
      const speed   = (0.08 + Math.random() * 0.12) * (isBoosting ? 2.2 : 1.0) * (0.5 + this.intensity);
      p.vx = backDir.x * speed + spreadX;
      p.vy = backDir.y * speed + spreadY;
      p.vz = backDir.z * speed;

      p.maxLife = 0.4 + Math.random() * 0.35;
      p.life    = p.maxLife;
    }

    // Update particles
    for (let i = 0; i < this.count; i++) {
      const p = this.particles[i];
      if (p.life > 0) {
        p.life -= dt;
        p.x += p.vx * dt * 60;
        p.y += p.vy * dt * 60;
        p.z += p.vz * dt * 60;
        // Slight turbulence
        p.vx += (Math.random() - 0.5) * 0.003;
        p.vy += (Math.random() - 0.5) * 0.003;

        const t = p.life / p.maxLife; // 1=new 0=old
        this.positions[i*3]   = p.x;
        this.positions[i*3+1] = p.y;
        this.positions[i*3+2] = p.z;
        this.sizes[i] = (0.18 + (1-t) * 0.4) * (isBoosting ? 1.6 : 1.0);

        // Color: white-yellow → orange → red → dark
        if (t > 0.75) {
          // Core: white-hot
          this.colors[i*3]   = 1.0;
          this.colors[i*3+1] = 0.95;
          this.colors[i*3+2] = 0.7;
        } else if (t > 0.5) {
          // Bright orange
          this.colors[i*3]   = 1.0;
          this.colors[i*3+1] = 0.55;
          this.colors[i*3+2] = 0.05;
        } else if (t > 0.25) {
          // Deep red
          this.colors[i*3]   = 0.9;
          this.colors[i*3+1] = 0.15;
          this.colors[i*3+2] = 0.0;
        } else {
          // Smoke/ember fade
          const f = t / 0.25;
          this.colors[i*3]   = 0.3 * f;
          this.colors[i*3+1] = 0.05 * f;
          this.colors[i*3+2] = 0.0;
        }
      } else {
        this.positions[i*3+2] = 99999;
        this.sizes[i] = 0;
      }
    }
    this.geo.attributes.position.needsUpdate = true;
    this.geo.attributes.color.needsUpdate    = true;
    this.geo.attributes.size.needsUpdate     = true;
  }
}

// Main center engine fire
const mainFire = new FireEngine(new THREE.Vector3(0, 0, 3.62), 0.18, scene);
// Wing pod fires
const leftFire  = new FireEngine(new THREE.Vector3(-2.85, 0, 1.86), 0.11, scene);
const rightFire = new FireEngine(new THREE.Vector3( 2.85, 0, 1.86), 0.11, scene);

// ─── TRAIL PARTICLES ─────────────────────────────────────────────────────────
const TRAIL_COUNT = 400;
const trailGeo = new THREE.BufferGeometry();
const trailPos  = new Float32Array(TRAIL_COUNT * 3);
const trailLife = new Float32Array(TRAIL_COUNT);

for (let i = 0; i < TRAIL_COUNT; i++) trailPos[i*3+2] = 99999;
trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPos, 3));

const trailMat = new THREE.PointsMaterial({
  color: 0x00e5ff, size: 0.08,
  transparent: true, opacity: 0.4,
  blending: THREE.AdditiveBlending, depthWrite: false,
});
const trail = new THREE.Points(trailGeo, trailMat);
scene.add(trail);
let trailIndex = 0;

// ─── INPUT ───────────────────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
document.addEventListener('keyup',   e => { keys[e.code] = false; });

let mouseDX = 0, mouseDY = 0, locked = false;
document.addEventListener('click', () => renderer.domElement.requestPointerLock());
document.addEventListener('pointerlockchange', () => {
  locked = document.pointerLockElement === renderer.domElement;
  if (locked) {
    document.getElementById('click-hint').style.opacity = '0';
    document.getElementById('hud').classList.add('visible');
    document.getElementById('speed-bar').classList.add('visible');
    document.getElementById('compass').classList.add('visible');
  }
});
document.addEventListener('mousemove', e => {
  if (locked) { mouseDX += e.movementX; mouseDY += e.movementY; }
});

// ─── SHIP STATE ──────────────────────────────────────────────────────────────
const velocity    = new THREE.Vector3();
const shipEuler   = new THREE.Euler(0, 0, 0, 'YXZ');
const shipQuat    = new THREE.Quaternion();
const neutralQuat = new THREE.Quaternion(); // identity = "north" orientation

const ACCEL      = 0.018;
const MAX_SPEED  = 0.55;
const MAX_BOOST  = 1.1;
const DAMPING    = 0.94;
const ROT_SPEED  = 0.0009; // halved from original 0.0018
const ROT_DAMP   = 0.86;

let yawRate = 0, pitchRate = 0, rollLean = 0;
let boostFactor = 1;
let speedNorm   = 0;
let isStabilizing = false;

// Camera
const camOffset = new THREE.Vector3(0, 2.5, 11);
const camTarget = new THREE.Vector3();
const camPos    = new THREE.Vector3(0, 3, 14);
let camFOV = 60;

const clock = new THREE.Clock();
const compassNeedle = document.getElementById('compass-needle');
const stabIndicator = document.getElementById('stabilize-indicator');

// ─── ANIMATION LOOP ──────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  const delta = Math.min(clock.getDelta(), 0.05);
  const t     = clock.elapsedTime;

  // ── BOOST ──
  const isBoosting = keys['ShiftLeft'] || keys['ShiftRight'];
  boostFactor += ((isBoosting ? 1.85 : 1.0) - boostFactor) * 0.07;
  const maxSpd = MAX_SPEED * boostFactor;

  // ── ALT = STABILIZE TO NEUTRAL ORIENTATION ──
  isStabilizing = keys['AltLeft'] || keys['AltRight'];
  if (isStabilizing) {
    // Slerp ship quaternion toward identity (neutral/"north" up orientation)
    ship.quaternion.slerp(neutralQuat, 0.045);
    // Extract back to euler so movement stays consistent
    shipEuler.setFromQuaternion(ship.quaternion, 'YXZ');
    // Dampen rotation rates
    yawRate   *= 0.7;
    pitchRate *= 0.7;
    // Also damp velocity toward zero (drag in space)
    velocity.multiplyScalar(0.97);
    stabIndicator.classList.add('active');
  } else {
    stabIndicator.classList.remove('active');
  }

  // ── MOUSE ROTATION (halved speed) ──
  if (locked && !isStabilizing) {
    yawRate   -= mouseDX * ROT_SPEED;
    pitchRate -= mouseDY * ROT_SPEED;
    mouseDX = 0; mouseDY = 0;
  } else {
    mouseDX = 0; mouseDY = 0;
  }

  // ── KEYBOARD ROTATION ──
  if (!isStabilizing) {
    if (keys['ArrowLeft'])  yawRate   += ROT_SPEED * 2.4;
    if (keys['ArrowRight']) yawRate   -= ROT_SPEED * 2.4;
    if (keys['ArrowUp'])    pitchRate += ROT_SPEED * 2.0;
    if (keys['ArrowDown'])  pitchRate -= ROT_SPEED * 2.0;
  }

  yawRate   *= ROT_DAMP;
  pitchRate *= ROT_DAMP;

  if (!isStabilizing) {
    shipEuler.y += yawRate;
    shipEuler.x += pitchRate;
    shipEuler.x  = Math.max(-Math.PI * 0.45, Math.min(Math.PI * 0.45, shipEuler.x));
    shipQuat.setFromEuler(shipEuler);
    ship.quaternion.slerp(shipQuat, 0.16);
  }

  // ── ROLL LEAN ──
  rollLean += (-yawRate * 30 - rollLean) * 0.10;
  if (!isStabilizing) ship.rotation.z = rollLean;
  else ship.rotation.z += (0 - ship.rotation.z) * 0.08;

  // ── THRUST ──
  const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(ship.quaternion);
  const right   = new THREE.Vector3(1, 0,  0).applyQuaternion(ship.quaternion);
  const up      = new THREE.Vector3(0, 1,  0).applyQuaternion(ship.quaternion);

  const thrusting = keys['KeyW'];
  if (thrusting)          velocity.addScaledVector(forward, ACCEL * boostFactor);
  if (keys['KeyS'])       velocity.addScaledVector(forward, -ACCEL * 0.6);
  if (keys['KeyA'])       velocity.addScaledVector(right,   -ACCEL * 0.7);
  if (keys['KeyD'])       velocity.addScaledVector(right,    ACCEL * 0.7);
  if (keys['Space'])      velocity.addScaledVector(up,       ACCEL * 0.7);
  if (keys['ControlLeft']) velocity.addScaledVector(up,     -ACCEL * 0.7);

  if (velocity.length() > maxSpd) velocity.setLength(maxSpd);
  velocity.multiplyScalar(DAMPING);
  ship.position.add(velocity);

  speedNorm = velocity.length() / MAX_BOOST;
  const thrustIntensity = thrusting ? (speedNorm * 1.5 + 0.4) : (speedNorm * 0.6 + 0.15);

  // ── FIRE ENGINES ──
  mainFire.update(ship.position, ship.quaternion, thrustIntensity, isBoosting, delta);
  leftFire.update(ship.position, ship.quaternion, thrustIntensity * 0.7, isBoosting, delta);
  rightFire.update(ship.position, ship.quaternion, thrustIntensity * 0.7, isBoosting, delta);

  // ── ENGINE GLOW ──
  const baseGlow  = 0.5 + Math.sin(t * 3.8) * 0.07;
  const speedGlow = speedNorm * 2.0;
  const totalGlow = baseGlow + speedGlow + (isBoosting ? 0.7 : 0);

  engineLight.intensity      = totalGlow * 3.2;
  leftEngineLight.intensity  = totalGlow * 1.6;
  rightEngineLight.intensity = totalGlow * 1.6;

  glowDisc.material.opacity      = Math.min(1, 0.65 + speedGlow * 0.5);
  leftPodGlow.material.opacity   = Math.min(1, 0.55 + speedGlow * 0.4);
  rightPodGlow.material.opacity  = Math.min(1, 0.55 + speedGlow * 0.4);

  cockpitMat.emissiveIntensity = 0.28 + Math.sin(t * 1.8) * 0.07 + speedNorm * 0.35;

  // ── BOOST FLASH ──
  document.getElementById('boost-flash').style.opacity = isBoosting ? (0.5 + speedNorm * 0.3).toString() : '0';

  // ── TRAIL ──
  if (speedNorm > 0.01) {
    const eWorld = new THREE.Vector3(0, 0, 3.5).applyQuaternion(ship.quaternion).add(ship.position);
    const count = isBoosting ? 4 : 2;
    for (let i = 0; i < count; i++) {
      const idx = trailIndex % TRAIL_COUNT;
      const sp = 0.12;
      trailPos[idx*3]   = eWorld.x + (Math.random()-0.5)*sp;
      trailPos[idx*3+1] = eWorld.y + (Math.random()-0.5)*sp;
      trailPos[idx*3+2] = eWorld.z + (Math.random()-0.5)*sp;
      trailLife[idx] = 1.0;
      trailIndex++;
    }
  }
  for (let i = 0; i < TRAIL_COUNT; i++) {
    if (trailLife[i] > 0) { trailLife[i] -= 0.018; }
    else { trailPos[i*3+2] = 99999; }
  }
  trailGeo.attributes.position.needsUpdate = true;
  trailMat.opacity = 0.3 + speedNorm * 0.35;

  // ── COMPASS NEEDLE (points toward world Y+ = "north up") ──
  const shipForwardXZ = new THREE.Vector3(0, 0, -1).applyQuaternion(ship.quaternion);
  const compassAngle = Math.atan2(shipForwardXZ.x, -shipForwardXZ.z);
  const cx = 35 + Math.sin(compassAngle) * 22;
  const cy = 35 - Math.cos(compassAngle) * 22;
  compassNeedle.setAttribute('x2', cx.toFixed(1));
  compassNeedle.setAttribute('y2', cy.toFixed(1));

  // ── CAMERA ──
  const shakeAmt = speedNorm > 0.45 ? (speedNorm - 0.45) * 0.018 : 0;
  const shakeDelta = new THREE.Vector3(
    (Math.random()-0.5)*shakeAmt,
    (Math.random()-0.5)*shakeAmt, 0
  );
  const desiredPos = camOffset.clone().applyQuaternion(ship.quaternion).add(ship.position).add(shakeDelta);
  camPos.lerp(desiredPos, 0.055);
  camera.position.copy(camPos);

  const lookTarget = ship.position.clone().add(new THREE.Vector3(0, 0.3, 0).applyQuaternion(ship.quaternion));
  camTarget.lerp(lookTarget, 0.07);
  camera.lookAt(camTarget);

  const targetFOV = 60 + speedNorm * 13 + (isBoosting ? 7 : 0);
  camFOV += (targetFOV - camFOV) * 0.06;
  camera.fov = camFOV;
  camera.updateProjectionMatrix();

  document.getElementById('speed-fill').style.height = (speedNorm * 100).toFixed(1) + '%';

  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

renderer.domElement.style.opacity = '0';
renderer.domElement.style.transition = 'opacity 2s ease';
setTimeout(() => { renderer.domElement.style.opacity = '1'; }, 100);

animate();
</script>
</body>
</html>
